apiVersion: v1
kind: ServiceAccount
metadata:
  name: agentic-sdlc-worker
  annotations:
    example.com/workload-identity: replace-with-cloud-role
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentic-sdlc-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agentic-sdlc-worker
  template:
    metadata:
      labels:
        app: agentic-sdlc-worker
    spec:
      serviceAccountName: agentic-sdlc-worker
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: replace.example/agentic-sdlc-runtime@sha256:replace
          args: ["worker"]
          env:
            - name: OPA_URL
              value: http://opa:8181/v1/data/agentic/allow
            - name: EVIDENCE_BUCKET
              value: replace-evidence-bucket
            - name: QUEUE_URL
              value: replace-queue-url
          resources:
            requests: {cpu: 250m, memory: 256Mi}
            limits: {cpu: "1", memory: 512Mi}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agentic-sdlc-worker-deny-by-default
spec:
  podSelector:
    matchLabels:
      app: agentic-sdlc-worker
  policyTypes: ["Ingress", "Egress"]
