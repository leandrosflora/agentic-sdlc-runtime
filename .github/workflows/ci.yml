name: CI

on:
  pull_request:
  push:
    branches: [master, main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pytest --cov=agentic_sdlc_runtime --cov-report=term-missing --cov-fail-under=70
      - run: python examples/run_demo.py
      - run: python examples/end_to_end_demo.py
      - run: python examples/end_to_end_demo.py --unhealthy
      - run: python scripts/security_scan.py
